springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

server:
  port: 8080
  servlet:
    context-path: /auth

file-server:
  min-io:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}

spring:
  datasource:
    username: ${DB_USER:neondb_owner}
    password: ${DB_PASSWORD:npg_ifnAt5brK9MP}
    url: ${DB_URL:jdbc:postgresql://ep-summer-smoke-a105ac9n-pooler.ap-southeast-1.aws.neon.tech:5432/godii?sslmode=require}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: fisone-service-connection-pool
      maximum-pool-size: 300
      minimum-idle: 10
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 900000
      connection-test-query: SELECT 1
    jpa:
      properties:
        hibernate:
          show_sql: true
          format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:liquibase/changelog-master.xml
    default-schema: public

  logging:
    level:
      org.hibernate: ERROR

  cloud:
    openfeign:
      client:
        config:
          keycloak:
            url: ${KEYCLOAK_URL}

app:
  feature:
    mail-enabled: false
