<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sending Email</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <!-- use the font -->
    <style>
        body {
            font-family: sans-serif;
            font-size: 14px;
            position: relative;
            background-color: #E5E5E5;
            padding: 0 15px;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 15px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        p {
            font-size: inherit;
            color: inherit;
            line-height: 2;
            margin-top: 0;
            margin-bottom:7px;
        }

        a:hover{
            color: blue;
        }

        .linkfoodter{
            color: white;
            text-decoration: none;
        }

        p:last-child {
            margin-bottom: 0;
        }

        table {
            background-color: #fff;
            width: 540px;
        }

        thead th {
            padding: 0;
            background-color: #F2F3F9;
        }

        @media screen and (max-width: 768px) {
            table {
                min-width: auto;
                width: 100%;
            }
        }
    </style>
</head>
<body>

<table border="0">
    <caption></caption>
    <thead>
    <tr>
        <th style="background-color: #19488A; padding: 25px 0;"><h1
                style="color : rgb(250, 250, 250) ; font-size : large; margin: 0">NEW CONTRACT AM ASSIGNED</h1></th>
    </tr>
    </thead>
    <tbody>
    <tr style="background-color: rgb(255, 255, 255)">
        <td style="padding: 5px 30px 30px; font-size: 14px;">
            <br>
            <p>Dear <span th:text="${to}">assignee</span>,<p>
            <p><span>You had been assigned to <strong th:text="${ticket_name}" >CONTRACT-0001</strong> by <strong th:text="${approved_name}">htbngoc</strong></span></p>
            <p><span>Please <a th:href="${document_url}">click here</a> to view details</span></p>
            <p>Best Regards,</p>
            <p style="color: red;"><strong>[THIS IS AN AUTOMATED MESSAGE FOR TESTING - PLEASE IGNORE THIS EMAIL]</strong></p>
        </td>
    </tr>
    <tr style="background-color:#19488A">
        <td style="padding: 15px 60px 20px; color: white; font-size: 12px;">
            <h2><strong>Esign System</strong></h2>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
